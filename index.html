<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sokoban Precision Scanner v2</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #2980b9; --success: #27ae60; --danger: #c0392b; --text: #eee; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        
        /* Video Container */
        #video-container { width: 90vw; max-width: 400px; position: relative; margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 2px solid #444; background: #000; }
        video { width: 100%; display: block; }
        
        /* Adjustable Scan Zone */
        #scan-zone { 
            position: absolute; 
            border: 2px solid #00ff00; 
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6);
            display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(9, 1fr);
            pointer-events: none;
        }
        .guide-box { border: 0.1px solid rgba(0,255,0,0.2); }

        /* Controls */
        .panel { background: var(--panel); padding: 12px; border-radius: 12px; margin-bottom: 10px; width: 90vw; max-width: 400px; box-sizing: border-box; }
        .control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; font-size: 12px; }
        .control-row input { flex: 1; accent-color: var(--accent); }

        .tool-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; justify-items: center; }
        .tool { width: 42px; height: 42px; border: 2px solid #444; cursor: pointer; background-size: contain; background-repeat: no-repeat; background-position: center; border-radius: 8px; background-color: #333; }
        .tool.selected { border-color: #00ff00; box-shadow: 0 0 10px rgba(0,255,0,0.3); }

        .grid { display: grid; grid-template-columns: repeat(9, 1fr); width: 90vw; max-width: 400px; aspect-ratio: 1/1; gap: 1px; border: 2px solid #444; background: #333; }
        .cell { background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #222; }

        .btns { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90vw; max-width: 400px; }
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        textarea { width: 90vw; max-width: 400px; height: 80px; background: #000; color: #0f0; margin-top: 10px; border-radius: 6px; padding: 10px; box-sizing: border-box; font-family: monospace; font-size: 10px; }
    </style>
</head>
<body>

    <h2>Precision Scanner</h2>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="scan-zone" style="top: 20%; left: 15%; width: 70%; height: 50%;">
            <script>for(let i=0; i<81; i++) document.write('<div class="guide-box"></div>');</script>
        </div>
    </div>

    <div class="panel">
        <div class="control-row"><span>Y:</span><input type="range" id="y-pos" min="0" max="80" value="20" oninput="updateZone()"></div>
        <div class="control-row"><span>X:</span><input type="range" id="x-pos" min="0" max="80" value="15" oninput="updateZone()"></div>
        <div class="control-row"><span>W:</span><input type="range" id="w-size" min="10" max="100" value="70" oninput="updateZone()"></div>
        <div class="control-row"><span>H:</span><input type="range" id="h-size" min="10" max="100" value="50" oninput="updateZone()"></div>
    </div>

    <div class="btns" style="margin-bottom: 10px;">
        <button onclick="startCamera()" style="background:var(--accent);">Camera</button>
        <button onclick="scanLevel()" style="background:#e67e22;">Scan Zone</button>
    </div>

    <div class="panel">
        <div class="tool-group" id="toolbox"></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="btns">
        <button onclick="resetGrid()" style="background:var(--danger);">Reset</button>
        <button onclick="generate()" style="background:var(--success);">Generate</button>
    </div>

    <textarea id="output" readonly></textarea>
    <canvas id="procCanvas" width="360" height="360" style="display:none;"></canvas>

    <script>
        const IMAGE_MAP = {
            0: "https://i.ibb.co.com/twR2psTC/Tree.png",
            1: "https://i.ibb.co.com/qLsXKRXm/Wall.png",
            2: "https://i.ibb.co.com/rGJXYXZ4/Player.png",
            3: "https://i.ibb.co.com/7NjmwQj7/Goal.png",
            4: "https://i.ibb.co.com/Kjqnc58f/Crate.png",
            5: "https://i.ibb.co.com/HfCpmXyp/Floor.png",
            6: "https://i.ibb.co.com/SDkKcr7J/Blue-player.png",
            7: "https://i.ibb.co.com/whcScYLJ/Blue-crate.png"
        };

        let selectedTool = 1;
        let gridData = Array(9).fill().map(() => Array(9).fill(5));
        const video = document.getElementById('video');
        const canvas = document.getElementById('procCanvas');
        const ctx = canvas.getContext('2d');
        const zone = document.getElementById('scan-zone');

        function updateZone() {
            zone.style.top = document.getElementById('y-pos').value + "%";
            zone.style.left = document.getElementById('x-pos').value + "%";
            zone.style.width = document.getElementById('w-size').value + "%";
            zone.style.height = document.getElementById('h-size').value + "%";
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) { alert("Error: " + err); }
        }

        function scanLevel() {
            if (!video.srcObject) return;
            ctx.drawImage(video, 0, 0, 360, 360);
            
            const zW = parseFloat(zone.style.width) / 100 * 360;
            const zH = parseFloat(zone.style.height) / 100 * 360;
            const zX = parseFloat(zone.style.left) / 100 * 360;
            const zY = parseFloat(zone.style.top) / 100 * 360;
            
            const stepX = zW / 9;
            const stepY = zH / 9;

            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const x = zX + (c * stepX) + (stepX / 2);
                    const y = zY + (r * stepY) + (stepY / 2);
                    const pixel = ctx.getImageData(x, y, 1, 1).data;
                    gridData[r][c] = analyzeColor(pixel[0], pixel[1], pixel[2]);
                }
            }
            renderGrid();
        }

        function analyzeColor(r, g, b) {
            if (b > r + 30 && b > g) return 3; 
            if (g > r + 15 && g > b) return 0; 
            if (r > 150 && g < 100 && b < 100) return 2; 
            if (r > 120 && g > 80 && b < 80) return 4; 
            if ((r+g+b)/3 < 70) return 1; 
            return 5;
        }

        function initTools() {
            const box = document.getElementById('toolbox');
            Object.keys(IMAGE_MAP).forEach(id => {
                const tool = document.createElement('div');
                tool.className = `tool ${id == selectedTool ? 'selected' : ''}`;
                tool.style.backgroundImage = `url('${IMAGE_MAP[id]}')`;
                tool.onclick = () => {
                    selectedTool = id;
                    document.querySelectorAll('.tool').forEach(t => t.classList.remove('selected'));
                    tool.classList.add('selected');
                };
                box.appendChild(tool);
            });
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            gridData.forEach((row, r) => {
                row.forEach((val, c) => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.backgroundImage = `url('${IMAGE_MAP[val]}')`;
                    cell.onclick = () => { gridData[r][c] = selectedTool; renderGrid(); };
                    container.appendChild(cell);
                });
            });
        }

        function generate() {
            document.getElementById('output').value = "level_data = [\n" + gridData.map(row => `    [${row.join(', ')}]`).join(",\n") + "\n]";
        }

        function resetGrid() { if(confirm("Reset?")) { gridData = Array(9).fill().map(() => Array(9).fill(5)); renderGrid(); } }

        initTools();
        renderGrid();
        updateZone();
    </script>
</body>
</html>
